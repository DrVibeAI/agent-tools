name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install
      - name: Syntax check (all packages)
        run: npm run check
      - name: phi-guard tests (offline, deterministic)
        run: node packages/phi-guard/test/smoke.mjs
      # Note: clinical-apis-mcp ships a live smoke test (npm test -w @drvibeai/clinical-apis-mcp)
      # that hits public APIs. It is run locally/manually rather than in CI to avoid
      # network flakiness and rate limits.
